version: '3.9'

services:
  sentinel:
    build:
      context: .
      dockerfile: Dockerfile
    image: stadium-sentinel:latest
    container_name: stadium-sentinel
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # Replace with your real phone number (international format, no +)
      - ADMIN_PHONE=${ADMIN_PHONE:-1234567890}
    volumes:
      # Persist the WhatsApp SQLite session so you don't re-scan QR on each restart
      - ./data:/app/data
